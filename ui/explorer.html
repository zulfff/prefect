<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prefect Explorer</title>
    <link rel="stylesheet" href="explorer.css" />
    <link rel="icon" type="image/svg+xml" href="./media/favicon.svg" />
</head>

<body>
    <div class="explorer-container">
        <!-- Left Sidebar -->
        <aside class="explorer-sidebar">
            <!-- Shortcuts: Home, Documents, Downloads, Media -->
            <section class="shortcuts-section" id="shortcuts"></section>

            <!-- Mounted Drives -->
            <section class="drives-section" id="drives"></section>
        </aside>

        <!-- Main Content Area -->
        <main class="explorer-main">
            <!-- Path Bar with Breadcrumbs and Close Button -->
            <header class="path-bar">
                <nav class="path-breadcrumbs" id="breadcrumbs"></nav>
                <button class="close-btn" id="close-btn" title="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </header>

            <!-- File Grid -->
            <div class="files-grid" id="files"></div>
        </main>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" id="ctx-copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
            <span>Copy</span>
            <span class="shortcut">Ctrl+C</span>
        </div>
        <div class="context-menu-item" id="ctx-cut">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="6" cy="6" r="3"/>
                <path d="M8.12 8.12 12 12"/>
                <path d="M20 4 8.12 15.88"/>
                <circle cx="6" cy="18" r="3"/>
                <path d="M14.8 14.8 20 20"/>
            </svg>
            <span>Cut</span>
            <span class="shortcut">Ctrl+X</span>
        </div>
        <div class="context-menu-item" id="ctx-paste">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            </svg>
            <span>Paste</span>
            <span class="shortcut">Ctrl+V</span>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" id="ctx-rename">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            </svg>
            <span>Rename</span>
            <span class="shortcut">F2</span>
        </div>
        <div class="context-menu-item danger" id="ctx-delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"/>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            </svg>
            <span>Delete</span>
            <span class="shortcut">Del</span>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal-content">
            <h3>Rename</h3>
            <input type="text" id="rename-input" placeholder="Enter new name" />
            <div class="modal-actions">
                <button class="btn-cancel" id="rename-cancel">Cancel</button>
                <button class="btn-confirm" id="rename-confirm">Rename</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-content">
            <h3>Delete</h3>
            <p id="delete-message">Are you sure you want to delete this item?</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="delete-cancel">Cancel</button>
                <button class="btn-confirm danger" id="delete-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="explorer.js"></script>
</body>

</html>
